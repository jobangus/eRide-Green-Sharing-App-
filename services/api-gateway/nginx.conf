worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m  rate=60r/m;

    # Upstream definitions
    upstream auth_service {
        server auth-service:5000;
        keepalive 32;
    }

    upstream ride_matching_service {
        server ride-matching-service:5000;
        keepalive 32;
    }

    upstream location_tracking_service {
        server location-tracking-service:5000;
        keepalive 32;
    }

    upstream payments_service {
        server payments-service:5000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # ─── Auth routes ───────────────────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=20 nodelay;
            proxy_pass http://auth_service/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }

        # ─── User / Me routes ──────────────────────────────
        location /api/me {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://auth_service/me;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/users/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://auth_service/users/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        # ─── Driver routes ─────────────────────────────────
        location /api/driver/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://ride_matching_service/driver/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        # ─── Rides routes ──────────────────────────────────
        location /api/rides/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://ride_matching_service/rides/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
            proxy_read_timeout 60s;
        }

        location /api/rides {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://ride_matching_service/rides;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        # ─── Sustainability routes ─────────────────────────
        location /api/sustainability/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://ride_matching_service/sustainability/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        # ─── Payments routes ───────────────────────────────
        location /api/payments/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://payments_service/payments/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
        }

        # Stripe webhook (no rate limit — Stripe has retry logic)
        location /api/payments/webhook {
            proxy_pass http://payments_service/payments/webhook;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Stripe-Signature $http_stripe_signature;
            proxy_read_timeout 30s;
        }

        # ─── WebSocket: location-tracking ─────────────────
        location /ws/location/ {
            proxy_pass http://location_tracking_service/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ─── WebSocket: ride-matching (socket.io) ─────────
        location /ws/rides/ {
            proxy_pass http://ride_matching_service/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ─── Socket.IO polling fallback ────────────────────
        location /socket.io/ {
            proxy_pass http://ride_matching_service/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
        }

        # Error pages
        error_page 404 /404.json;
        location = /404.json {
            return 404 '{"error":"not_found","message":"Endpoint not found"}';
            add_header Content-Type application/json;
        }

        error_page 429 /429.json;
        location = /429.json {
            return 429 '{"error":"rate_limited","message":"Too many requests. Please slow down."}';
            add_header Content-Type application/json;
        }

        error_page 502 503 504 /50x.json;
        location = /50x.json {
            return 503 '{"error":"service_unavailable","message":"A backend service is temporarily unavailable."}';
            add_header Content-Type application/json;
        }
    }
}
